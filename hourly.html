<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hourly Forecast - WeatherNow</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="hourly.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>WeatherNow</h1>
                </div>
                <nav class="main-nav">
                    <a href="index.html" class="nav-link">Weather</a>
                    <a href="hourly.html" class="nav-link active">Hourly</a>
                    <a href="10days.html" class="nav-link">10 Days</a>
                    <a href="month.html" class="nav-link">Month</a>
                </nav>
                <div class="search-box">
                    <input type="text" id="citySearch" placeholder="Search city..." class="search-input">
                    <button id="searchBtn" class="search-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <section class="page-header">
                <h2 id="pageTitle">Hourly Forecast for Moscow</h2>
                <p id="pageSubtitle">Next 48 hours</p>
            </section>

            <section class="hourly-detailed">
                <div class="hourly-table" id="hourlyTable">
                    <!-- Populated by JS -->
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 WeatherNow. Weather data for demonstration purposes.</p>
        </div>
    </footer>

    <script src="weather-data.js"></script>
    <script src="app.js"></script>
    <script src="hourly.js"></script>
</body>
</html>
